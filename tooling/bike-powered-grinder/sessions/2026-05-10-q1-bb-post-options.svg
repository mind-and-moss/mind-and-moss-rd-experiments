<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="system-ui, sans-serif">
  <!-- Side view from rider's right. World: +Y rightward (forward, toward desk), +Z upward. Origin at floor under rider's seat. -->

  <!-- Background -->
  <rect width="1100" height="700" fill="#fafafa"/>

  <!-- Title -->
  <text x="550" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#222">Q1 — Where does the ground post meet the BB shell?</text>
  <text x="550" y="58" font-size="14" text-anchor="middle" fill="#555">Side view from rider's right side. Rider sits on the left, desk is on the right.</text>

  <!-- Coordinate scale: 1 mm = 0.5 px. Origin (Y=0, Z=0) at floor under seat at SVG (150, 620). -->
  <!-- World Y (mm) -> SVG x: x = 150 + Y * 0.5 -->
  <!-- World Z (mm) -> SVG y: y = 620 - Z * 0.5 -->

  <!-- Floor -->
  <line x1="40" y1="620" x2="1060" y2="620" stroke="#8a7a5c" stroke-width="3"/>
  <pattern id="ground" width="20" height="20" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="20" y2="20" stroke="#c9b894" stroke-width="1"/>
  </pattern>
  <rect x="40" y="620" width="1020" height="60" fill="url(#ground)" opacity="0.7"/>
  <text x="50" y="675" font-size="12" fill="#8a7a5c">FLOOR (Z=0)</text>

  <!-- Desk: depth 800, height 750 (illustrative). Top runs Y=0..800 (in our case desk_depth ~800mm based on belt_centerline). -->
  <!-- Use desk_height=750 and desk_depth=800 for illustration. Top at Z=750. -->
  <rect x="150" y="245" width="400" height="20" fill="#5b4a30" opacity="0.9"/>
  <text x="350" y="240" font-size="13" text-anchor="middle" fill="#5b4a30">Desk top (Z = 750 mm)</text>

  <!-- Desk legs (at Y=25 front and Y=775 back; show the back leg as desk goes from Y=0 to Y=800) -->
  <rect x="158" y="265" width="14" height="355" fill="#5b4a30"/>
  <rect x="535" y="265" width="14" height="355" fill="#5b4a30"/>
  <text x="165" y="635" font-size="10" fill="#5b4a30">front leg</text>
  <text x="540" y="635" font-size="10" fill="#5b4a30">back leg</text>

  <!-- Rider seat (school chair) at Y ~= -200 (behind origin, but draw at left) -->
  <rect x="60" y="395" width="80" height="14" fill="#d4a017"/>
  <line x1="65" y1="409" x2="65" y2="620" stroke="#888" stroke-width="2"/>
  <line x1="135" y1="409" x2="135" y2="620" stroke="#888" stroke-width="2"/>
  <text x="100" y="385" font-size="12" text-anchor="middle" fill="#a07810">RIDER (school chair)</text>

  <!-- Stick figure rider -->
  <circle cx="100" cy="360" r="14" fill="#fff" stroke="#444" stroke-width="2"/>
  <line x1="100" y1="374" x2="100" y2="420" stroke="#444" stroke-width="2"/>
  <!-- Pedaling leg toward BB -->
  <line x1="100" y1="410" x2="180" y2="455" stroke="#444" stroke-width="2"/>
  <line x1="180" y1="455" x2="275" y2="475" stroke="#444" stroke-width="2"/>

  <!-- BB shell at world (Y=250, Z=290): SVG (150 + 125, 620 - 145) = (275, 475) -->
  <!-- Draw BB axle as a circle (sleeve cross-section from side) -->
  <circle cx="275" cy="475" r="22" fill="#bbb" stroke="#333" stroke-width="2"/>
  <circle cx="275" cy="475" r="6" fill="#333"/>
  <text x="275" y="441" font-size="13" font-weight="700" text-anchor="middle" fill="#222">BB shell</text>
  <text x="275" y="427" font-size="11" text-anchor="middle" fill="#555">(pedal axle housing)</text>
  <text x="275" y="513" font-size="10" text-anchor="middle" fill="#555">Y=250, Z=290</text>

  <!-- Pedal circle (radius ~170mm in world = 85px) - the pedal travels around the BB -->
  <circle cx="275" cy="475" r="85" fill="none" stroke="#cc7733" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="275" y="395" font-size="10" text-anchor="middle" fill="#cc7733">pedal swing path (in/out of page)</text>

  <!-- ======================== POST OPTION A — DIRECTLY UNDER (RED) ======================== -->
  <line x1="275" y1="497" x2="275" y2="620" stroke="#d43030" stroke-width="8"/>
  <rect x="240" y="618" width="70" height="20" fill="#888" stroke="#444"/>
  <text x="275" y="650" font-size="11" text-anchor="middle" fill="#d43030">concrete block</text>
  <!-- Label A -->
  <line x1="275" y1="560" x2="450" y2="560" stroke="#d43030" stroke-width="1.5"/>
  <circle cx="448" cy="560" r="14" fill="#d43030"/>
  <text x="448" y="565" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">A</text>
  <text x="470" y="555" font-size="14" font-weight="700" fill="#d43030">DIRECTLY UNDER</text>
  <text x="470" y="572" font-size="12" fill="#888">Post rises straight to the bottom of the BB shell.</text>
  <text x="470" y="586" font-size="12" fill="#888">Shortest load path. Recommended.</text>

  <!-- ======================== POST OPTION B — BEHIND (BLUE), TOWARD RIDER ======================== -->
  <line x1="245" y1="475" x2="245" y2="620" stroke="#2855c8" stroke-width="8"/>
  <rect x="210" y="618" width="70" height="20" fill="#888" stroke="#444" opacity="0.7"/>
  <line x1="245" y1="475" x2="265" y2="475" stroke="#2855c8" stroke-width="3"/>
  <!-- Label B -->
  <line x1="245" y1="540" x2="450" y2="615" stroke="#2855c8" stroke-width="1.5"/>
  <circle cx="448" cy="615" r="14" fill="#2855c8"/>
  <text x="448" y="620" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">B</text>
  <text x="470" y="610" font-size="14" font-weight="700" fill="#2855c8">BEHIND (rider side)</text>
  <text x="470" y="627" font-size="12" fill="#888">Post on the rider's side of the shell.</text>
  <text x="470" y="641" font-size="12" fill="#888">Adds bending moment to the joint.</text>

  <!-- ======================== POST OPTION C — IN FRONT (GREEN), TOWARD DESK ======================== -->
  <line x1="305" y1="475" x2="305" y2="620" stroke="#1e9c48" stroke-width="8"/>
  <rect x="270" y="618" width="70" height="20" fill="#888" stroke="#444" opacity="0.7"/>
  <line x1="285" y1="475" x2="305" y2="475" stroke="#1e9c48" stroke-width="3"/>
  <!-- Label C -->
  <line x1="305" y1="395" x2="800" y2="395" stroke="#1e9c48" stroke-width="1.5"/>
  <circle cx="798" cy="395" r="14" fill="#1e9c48"/>
  <text x="798" y="400" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">C</text>
  <text x="820" y="390" font-size="14" font-weight="700" fill="#1e9c48">IN FRONT (desk side)</text>
  <text x="820" y="407" font-size="12" fill="#888">Post on the desk side of the shell.</text>
  <text x="820" y="421" font-size="12" fill="#888">Encroaches on pedal arc + bending.</text>

  <!-- Axes legend, bottom-left -->
  <g transform="translate(60,640)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="20" x2="0" y2="-20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="46" y="25" font-size="11" fill="#333">+Y (forward, toward desk)</text>
    <text x="6" y="-25" font-size="11" fill="#333">+Z (up)</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#333"/>
    </marker>
  </defs>
</svg>
